<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CS Tutor</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 720px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #f7f7f8;
      color: #222;
    }
    h1 { font-size: 1.25rem; margin-bottom: 1rem; }
    #chat {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1rem;
      height: 65vh;
      overflow-y: auto;
      margin-bottom: 1rem;
    }
    .msg {
      margin: 0.6rem 0;
      padding: 0.6rem 0.8rem;
      border-radius: 6px;
      white-space: pre-wrap;
      line-height: 1.4;
    }
    .user { background: #e8f0fe; align-self: flex-end; }
    .bot  { background: #f1f1f1; }
    form { display: flex; gap: 0.5rem; }
    input[type=text] {
      flex: 1;
      padding: 0.6rem 0.8rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
    }
    button {
      padding: 0.6rem 1rem;
      border: none;
      background: #2563eb;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }
    button:disabled { background: #9bb1e0; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>CS Tutor</h1>
  <div id="chat"></div>
  <form id="form">
    <input id="input" type="text" autocomplete="off" placeholder="Type your message…" />
    <button id="send" type="submit">Send</button>
  </form>

  <script>
    const chat = document.getElementById("chat");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    let sessionId = null;

    function append(role, text) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function start() {
      const res = await fetch("/start", { method: "POST" });
      const data = await res.json();
      sessionId = data.session_id;
      append("bot", data.reply);
    }

    async function sendMessage(msg) {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, message: msg }),
      });
      return res;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const msg = input.value.trim();
      if (!msg) return;
      if (!sessionId) await start();
      append("user", msg);
      input.value = "";
      send.disabled = true;
      try {
        let res = await sendMessage(msg);
        if (res.status === 400) {
          // Session expired (e.g. server restarted) — restart and retry once.
          await start();
          res = await sendMessage(msg);
        }
        const data = await res.json();
        append("bot", data.reply || data.error || "(no response)");
      } catch (err) {
        append("bot", "Error: " + err.message);
      } finally {
        send.disabled = false;
        input.focus();
      }
    });

    start();
  </script>
</body>
</html>
